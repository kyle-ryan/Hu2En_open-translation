name: Validate subtitles

on:
  pull_request:
    paths:
      - "subtitles/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON syntax
        run: |
          for f in subtitles/*.json; do
            # skip whisper files — they're large, syntax-check only
            echo "Checking $f ..."
            python -m json.tool "$f" > /dev/null
          done

      - name: Validate segments integrity
        run: python .github/scripts/validate_subtitles.py
